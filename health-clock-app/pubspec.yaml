name: health_clock
description: 健康时钟 - 基于 AI 的家庭健康提醒与档案管理 App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 路由
  go_router: ^14.2.7

  # 本地数据库
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # 网络请求
  dio: ^5.7.0

  # JSON 序列化
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Supabase
  supabase_flutter: ^2.6.0

  # 图表
  fl_chart: ^0.69.0

  # 文件选择
  file_picker: ^8.1.2
  image_picker: ^1.1.2

  # 本地通知
  flutter_local_notifications: ^17.2.3

  # 权限处理
  permission_handler: ^11.3.1

  # UI 组件
  cupertino_icons: ^1.0.8
  intl: ^0.19.0

  # 工具库
  uuid: ^4.5.1
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 代码生成
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.20.0

  # 代码规范
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

